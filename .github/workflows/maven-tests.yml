name: Maven CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sonar-console

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: sonar-console/pom.xml

      - name: Check formatting
        run: >
          mvn --batch-mode --no-transfer-progress
          com.spotify.fmt:fmt-maven-plugin:2.27:check

      - name: Run tests
        run: mvn --batch-mode --no-transfer-progress clean test